name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  security-events: write
  actions: read
  packages: write

jobs:
  deploy-staging:
    name: Deploy to Staging (GHCR)
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cloudmart-app-image
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Load image
        run: docker load -i cloudmart-app.tar

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: push
        name: Tag and push staging image
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          IMAGE_NAME_LOWER=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          docker tag cloudmart-app:${{ github.event.workflow_run.head_sha }} "$IMAGE_NAME_LOWER:staging-$SHA"
          docker tag cloudmart-app:${{ github.event.workflow_run.head_sha }} "$IMAGE_NAME_LOWER:staging"
          docker push "$IMAGE_NAME_LOWER:staging-$SHA"
          docker push "$IMAGE_NAME_LOWER:staging"
          echo "image=$IMAGE_NAME_LOWER:staging-$SHA" >> "$GITHUB_OUTPUT"

  smoke-staging:
    name: Smoke Test Staging
    needs: deploy-staging
    if: needs.deploy-staging.result == 'success'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run staging container
        run: |
          docker pull "${{ needs.deploy-staging.outputs.image }}"
          docker run -d --name cloudmart-staging -p 8080:8080 "${{ needs.deploy-staging.outputs.image }}"

      - name: Smoke test
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/healthz > /dev/null; then
              echo "App is up"; break
            fi
            sleep 2
          done
          curl -sf http://localhost:8080/healthz
          curl -sf http://localhost:8080/ > /dev/null

      - name: Stop staging container
        if: always()
        run: docker stop cloudmart-staging || true

  dast-staging:
    name: DAST (OWASP ZAP)
    needs: [deploy-staging, smoke-staging]
    if: needs.deploy-staging.result == 'success' && needs.smoke-staging.result == 'success'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run staging container
        run: |
          docker pull "${{ needs.deploy-staging.outputs.image }}"
          docker run -d --name cloudmart-staging -p 8080:8080 "${{ needs.deploy-staging.outputs.image }}"
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/healthz > /dev/null; then
              echo "App is up"; break
            fi
            sleep 2
          done

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: http://localhost:8080
          rules_file_name: .github/zap/rules.tsv
          cmd_options: '-a'
          fail_action: warn
          allow_issue_writing: false

      - name: Upload ZAP baseline report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-baseline-report
          path: |
            report_html.html
            report_json.json
          retention-days: 90
          overwrite: true

      - name: Gate - block on HIGH finding
        if: always()
        run: |
          if [ ! -f report_json.json ]; then
            echo "No ZAP report found, skipping gate"
            exit 0
          fi
          HIGH=$(python3 -c "
          import json
          with open('report_json.json') as f:
              data = json.load(f)
          alerts = [a for s in data.get('site', []) for a in s.get('alerts', [])]
          print(sum(1 for a in alerts if a.get('riskcode') == '3'))
          ")
          echo "HIGH findings: $HIGH"
          if [ "$HIGH" -gt "0" ]; then
            echo "GATE: BLOCKED - $HIGH HIGH finding(s)"
            exit 1
          fi

      - name: ZAP API scan
        uses: zaproxy/action-api-scan@5158fe4d9d8fcc75ea204db81317cce7f9e5453d # v0.10.0
        with:
          target: http://localhost:8080/openapi.json
          format: openapi
          fail_action: warn
          allow_issue_writing: false

      - name: Upload ZAP API report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-api-report
          path: |
            report_html.html
            report_json.json
          retention-days: 90
          overwrite: true

      - name: Stop staging container
        if: always()
        run: docker stop cloudmart-staging || true

  approval-gate:
    name: Manual Approval
    needs: dast-staging
    if: needs.dast-staging.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Approved for production deploy by ${{ github.actor }}"

  deploy-production:
    name: Deploy to Production (GHCR)
    needs: [deploy-staging, approval-gate]
    if: needs.deploy-staging.result == 'success' && needs.approval-gate.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cloudmart-app-image
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Load image
        run: docker load -i cloudmart-app.tar

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: push
        name: Tag and push production image
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          IMAGE_NAME_LOWER=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          docker tag cloudmart-app:${{ github.event.workflow_run.head_sha }} "$IMAGE_NAME_LOWER:prod-$SHA"
          docker tag cloudmart-app:${{ github.event.workflow_run.head_sha }} "$IMAGE_NAME_LOWER:latest"
          docker push "$IMAGE_NAME_LOWER:prod-$SHA"
          docker push "$IMAGE_NAME_LOWER:latest"
          echo "image=$IMAGE_NAME_LOWER:prod-$SHA" >> "$GITHUB_OUTPUT"

      - name: Write audit log
        run: |
          echo "Deployed commit ${{ github.event.workflow_run.head_sha }} by ${{ github.actor }} at $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            >> "$GITHUB_STEP_SUMMARY"

  smoke-production:
    name: Smoke Test Production
    needs: deploy-production
    if: needs.deploy-production.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run production container
        run: |
          docker pull "${{ needs.deploy-production.outputs.image }}"
          docker run -d --name cloudmart-prod -p 8080:8080 "${{ needs.deploy-production.outputs.image }}"

      - name: Smoke test
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/healthz > /dev/null; then
              echo "App is up"; break
            fi
            sleep 2
          done
          curl -sf http://localhost:8080/healthz

      - name: Stop production container
        if: always()
        run: docker stop cloudmart-prod || true
