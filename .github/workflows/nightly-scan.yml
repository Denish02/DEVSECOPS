name: Nightly Deep Scan

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  packages: read

jobs:
  trivy-full-scan:
    name: Trivy Full Scan + SBOM + License
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Trivy
        run: |
          curl -sfL https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Trivy full vulnerability scan (all severities, report only)
        run: |
          trivy fs . --scanners vuln,secret,misconfig --format json --output trivy-full-report.json --exit-code 0

      - name: Generate SBOM (CycloneDX)
        run: trivy fs src --format cyclonedx --output sbom-cyclonedx.json

      - name: Generate SBOM (SPDX)
        run: trivy fs src --format spdx-json --output sbom-spdx.json

      - name: License compliance scan
        run: |
          trivy fs src --scanners license --format table --output license-report.txt --exit-code 0

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-nightly-reports
          path: |
            trivy-full-report.json
            sbom-cyclonedx.json
            sbom-spdx.json
            license-report.txt
          retention-days: 90

  semgrep-full-scan:
    name: Semgrep Full Codebase Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep@sha256:06938c1f365d3f67b8cedd8bc117607ae64253f88a0e768e9da9408548927dd6 # latest as of 2026-07
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run full Semgrep scan
        run: |
          semgrep scan --config=auto --json --output=semgrep-full-report.json
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-nightly-report
          path: semgrep-full-report.json
          retention-days: 90

  zap-active-scan:
    name: ZAP Full Active Scan
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run staging container
        run: |
          STAGING_IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):staging"
          docker pull "$STAGING_IMAGE" || echo "No staging image yet, skipping"
          docker run -d --name cloudmart-staging -p 8080:8080 "$STAGING_IMAGE" || true
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/healthz > /dev/null; then
              echo "App is up"; break
            fi
            sleep 2
          done

      - name: ZAP full active scan
        uses: zaproxy/action-full-scan@3c58388149901b9a03b7718852c5ba889646c27c # v0.13.0
        with:
          target: http://localhost:8080
          fail_action: warn
          allow_issue_writing: false

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: zap-active-report
          path: |
            report_html.html
            report_json.json
          retention-days: 90

      - name: Stop staging container
        if: always()
        run: docker stop cloudmart-staging || true

  compliance-summary:
    name: Compliance Summary
    needs: [trivy-full-scan, semgrep-full-scan, zap-active-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Build compliance summary
        run: |
          {
            echo "CloudMart Nightly Compliance Summary"
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Commit: ${{ github.sha }}"
            echo ""
            echo "Artefacts collected:"
            find artifacts -type f | sort
          } > compliance-summary.txt

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compliance-summary
          path: compliance-summary.txt
          retention-days: 365
