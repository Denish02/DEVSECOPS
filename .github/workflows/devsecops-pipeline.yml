name: DevSecOps Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write
  actions: read
  packages: write

jobs:
  python-ci:
    name: Python CI (Ruff, Black, pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff black pytest

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: pytest
        run: |
          if [ -d tests ] || ls test_*.py **/test_*.py 2>/dev/null | grep -q .; then
            pytest
          else
            echo "No tests found, skipping pytest"
          fi

  secrets-scan:
    name: Secrets Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Trivy
        run: |
          curl -sfL https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Trivy secrets scan
        run: trivy fs . --scanners secret --format sarif --output trivy-secrets.sarif --exit-code 0

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-secrets.sarif
          category: trivy-secrets

      - name: Gate - block on any confirmed secret
        run: trivy fs . --scanners secret --exit-code 1

  sast-scan:
    name: SAST (Semgrep)
    needs: secrets-scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep@sha256:06938c1f365d3f67b8cedd8bc117607ae64253f88a0e768e9da9408548927dd6 # latest as of 2026-07
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=auto \
            --sarif \
            --output=semgrep-results.sarif \
            --severity=ERROR \
            --severity=WARNING
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Gate - block on ERROR severity
        run: |
          semgrep scan --config=auto --severity=ERROR --error
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  sca-scan:
    name: SCA (Trivy)
    needs: secrets-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Trivy
        run: |
          curl -sfL https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Trivy dependency scan
        run: |
          trivy fs src --scanners vuln --severity CRITICAL,HIGH --ignore-unfixed \
            --format sarif --output trivy-sca.sarif --exit-code 0

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-sca.sarif
          category: trivy-sca

      - name: Gate - block on CRITICAL CVE
        run: trivy fs src --scanners vuln --severity CRITICAL --ignore-unfixed --exit-code 1

  build:
    name: Docker Build
    needs: [python-ci, sast-scan, sca-scan]
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      image-name: ${{ steps.meta.outputs.name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: meta
        run: |
          echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t cloudmart-app:${{ github.sha }} ./src

      - name: Save image as artifact
        run: docker save cloudmart-app:${{ github.sha }} -o cloudmart-app.tar

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cloudmart-app-image
          path: cloudmart-app.tar
          retention-days: 1

  container-scan:
    name: Container Scan (Trivy)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cloudmart-app-image

      - name: Load image
        run: docker load -i cloudmart-app.tar

      - name: Install Trivy
        run: |
          curl -sfL https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Trivy image scan
        run: |
          trivy image cloudmart-app:${{ needs.build.outputs.image-tag }} --scanners vuln,secret \
            --severity CRITICAL,HIGH --ignore-unfixed --format sarif --output trivy-image.sarif --exit-code 0

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-container

      - name: Gate - block on CRITICAL CVE
        run: |
          trivy image cloudmart-app:${{ needs.build.outputs.image-tag }} --scanners vuln \
            --severity CRITICAL --ignore-unfixed --exit-code 1

  iac-scan:
    name: IaC Scan (Trivy)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Trivy
        run: |
          curl -sfL https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Trivy config scan
        run: |
          trivy config . --severity CRITICAL,HIGH,MEDIUM --format sarif --output trivy-iac.sarif --exit-code 0
        # WARN only - never blocks

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac

  deploy-staging:
    name: Deploy to Staging (GHCR)
    needs: [build, container-scan, iac-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cloudmart-app-image

      - name: Load image
        run: docker load -i cloudmart-app.tar

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: push
        name: Tag and push staging image
        env:
          IMAGE_NAME: ${{ needs.build.outputs.image-name }}
        run: |
          docker tag cloudmart-app:${{ github.sha }} ${{ env.IMAGE_NAME }}:staging-${{ github.sha }}
          docker tag cloudmart-app:${{ github.sha }} ${{ env.IMAGE_NAME }}:staging
          docker push ${{ env.IMAGE_NAME }}:staging-${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:staging
          echo "image=${{ env.IMAGE_NAME }}:staging-${{ github.sha }}" >> "$GITHUB_OUTPUT"

  approval-gate:
    name: Manual Approval
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Approved for production deploy by ${{ github.actor }}"

  deploy-production:
    name: Deploy to Production (GHCR)
    needs: [build, approval-gate]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cloudmart-app-image

      - name: Load image
        run: docker load -i cloudmart-app.tar

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push production image
        env:
          IMAGE_NAME: ${{ needs.build.outputs.image-name }}
        run: |
          docker tag cloudmart-app:${{ github.sha }} ${{ env.IMAGE_NAME }}:prod-${{ github.sha }}
          docker tag cloudmart-app:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:prod-${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Write audit log
        run: |
          echo "Deployed commit ${{ github.sha }} by ${{ github.actor }} at $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            >> "$GITHUB_STEP_SUMMARY"
