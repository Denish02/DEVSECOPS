name: DevSecOps Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write
  packages: write

jobs:
  secrets-scan:
    name: Secrets Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trivy secrets scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          format: sarif
          output: trivy-secrets.sarif
          exit-code: 0

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-secrets.sarif
          category: trivy-secrets

      - name: Gate - block on any confirmed secret
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          exit-code: 1

  sast-scan:
    name: SAST (Semgrep)
    needs: secrets-scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=auto \
            --sarif \
            --output=semgrep-results.sarif \
            --severity=ERROR \
            --severity=WARNING
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Gate - block on ERROR severity
        run: |
          semgrep scan --config=auto --severity=ERROR --error
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  sca-scan:
    name: SCA (Trivy)
    needs: secrets-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy dependency scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: src
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: sarif
          output: trivy-sca.sarif
          exit-code: 0

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-sca.sarif
          category: trivy-sca

      - name: Gate - block on CRITICAL CVE
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: src
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

  build:
    name: Docker Build
    needs: [sast-scan, sca-scan]
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      image-name: ${{ steps.meta.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t cloudmart-app:${{ github.sha }} ./src

      - name: Save image as artifact
        run: docker save cloudmart-app:${{ github.sha }} -o cloudmart-app.tar

      - uses: actions/upload-artifact@v4
        with:
          name: cloudmart-app-image
          path: cloudmart-app.tar
          retention-days: 1

  container-scan:
    name: Container Scan (Trivy)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cloudmart-app-image

      - name: Load image
        run: docker load -i cloudmart-app.tar

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: cloudmart-app:${{ needs.build.outputs.image-tag }}
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif
          exit-code: 0

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-container

      - name: Gate - block on CRITICAL CVE
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: cloudmart-app:${{ needs.build.outputs.image-tag }}
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

  iac-scan:
    name: IaC Scan (Trivy)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy-iac.sarif
          exit-code: 0 # WARN only - never blocks

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac

  deploy-staging:
    name: Deploy to Staging (GHCR)
    needs: [build, container-scan, iac-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cloudmart-app-image

      - name: Load image
        run: docker load -i cloudmart-app.tar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: push
        name: Tag and push staging image
        env:
          IMAGE_NAME: ${{ needs.build.outputs.image-name }}
        run: |
          docker tag cloudmart-app:${{ github.sha }} ${{ env.IMAGE_NAME }}:staging-${{ github.sha }}
          docker tag cloudmart-app:${{ github.sha }} ${{ env.IMAGE_NAME }}:staging
          docker push ${{ env.IMAGE_NAME }}:staging-${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:staging
          echo "image=${{ env.IMAGE_NAME }}:staging-${{ github.sha }}" >> "$GITHUB_OUTPUT"

  approval-gate:
    name: Manual Approval
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Approved for production deploy by ${{ github.actor }}"

  deploy-production:
    name: Deploy to Production (GHCR)
    needs: [build, approval-gate]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cloudmart-app-image

      - name: Load image
        run: docker load -i cloudmart-app.tar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push production image
        env:
          IMAGE_NAME: ${{ needs.build.outputs.image-name }}
        run: |
          docker tag cloudmart-app:${{ github.sha }} ${{ env.IMAGE_NAME }}:prod-${{ github.sha }}
          docker tag cloudmart-app:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:prod-${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Write audit log
        run: |
          echo "Deployed commit ${{ github.sha }} by ${{ github.actor }} at $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            >> "$GITHUB_STEP_SUMMARY"
