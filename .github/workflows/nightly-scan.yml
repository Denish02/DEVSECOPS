name: Nightly Deep Scan

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  trivy-full-scan:
    name: Trivy Full Scan + SBOM + License
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy full vulnerability scan (all severities, report only)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: json
          output: trivy-full-report.json
          exit-code: 0

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: src
          format: cyclonedx
          output: sbom-cyclonedx.json

      - name: Generate SBOM (SPDX)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: src
          format: spdx-json
          output: sbom-spdx.json

      - name: License compliance scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: src
          scanners: license
          format: table
          output: license-report.txt
          exit-code: 0

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-nightly-reports
          path: |
            trivy-full-report.json
            sbom-cyclonedx.json
            sbom-spdx.json
            license-report.txt
          retention-days: 90

  semgrep-full-scan:
    name: Semgrep Full Codebase Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run full Semgrep scan
        run: |
          semgrep scan --config=auto --json --output=semgrep-full-report.json
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-nightly-report
          path: semgrep-full-report.json
          retention-days: 90

  zap-active-scan:
    name: ZAP Full Active Scan
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run staging container
        run: |
          STAGING_IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):staging"
          docker pull "$STAGING_IMAGE" || echo "No staging image yet, skipping"
          docker run -d --name cloudmart-staging -p 8080:80 "$STAGING_IMAGE" || true
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/healthz.php > /dev/null; then
              echo "App is up"; break
            fi
            sleep 2
          done

      - name: ZAP full active scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: http://localhost:8080
          fail_action: warn

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-active-report
          path: |
            report_html.html
            report_json.json
          retention-days: 90

      - name: Stop staging container
        if: always()
        run: docker stop cloudmart-staging || true

  compliance-summary:
    name: Compliance Summary
    needs: [trivy-full-scan, semgrep-full-scan, zap-active-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build compliance summary
        run: |
          {
            echo "CloudMart Nightly Compliance Summary"
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Commit: ${{ github.sha }}"
            echo ""
            echo "Artefacts collected:"
            find artifacts -type f | sort
          } > compliance-summary.txt

      - uses: actions/upload-artifact@v4
        with:
          name: compliance-summary
          path: compliance-summary.txt
          retention-days: 365
