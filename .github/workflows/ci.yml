name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  lint-test:
    name: Python CI (Ruff, Black, pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: src/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f src/requirements.txt ]; then pip install -r src/requirements.txt; fi
          pip install ruff black pytest pytest-cov

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: pytest
        run: PYTHONPATH=src pytest src/tests --cov=src --cov-report=term-missing

  secrets-scan:
    name: Secrets Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Get cache date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ steps.date.outputs.date }}
          restore-keys: |
            trivy-db-

      - name: Install Trivy
        run: |
          curl -sfL https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Trivy secrets scan
        run: |
          trivy fs . --scanners secret --format json --output trivy-secrets.json --exit-code 0
          trivy convert --format sarif --output trivy-secrets.sarif trivy-secrets.json

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-secrets.sarif
          category: trivy-secrets

      - name: Gate - block on any confirmed secret
        run: |
          COUNT=$(python3 -c "
          import json
          d = json.load(open('trivy-secrets.json'))
          print(sum(len(r.get('Secrets', [])) for r in d.get('Results', [])))
          ")
          echo "Secrets found: $COUNT"
          [ "$COUNT" -eq 0 ] || { echo "GATE: BLOCKED - $COUNT secret(s) found"; exit 1; }

  sast-scan:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep@sha256:06938c1f365d3f67b8cedd8bc117607ae64253f88a0e768e9da9408548927dd6 # latest as of 2026-07
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=auto \
            --json-output=semgrep-results.json \
            --sarif-output=semgrep-results.sarif \
            --severity=ERROR \
            --severity=WARNING
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Gate - block on ERROR severity
        run: |
          ERRORS=$(python3 -c "
          import json
          d = json.load(open('semgrep-results.json'))
          print(sum(1 for r in d.get('results', []) if r.get('extra', {}).get('severity') == 'ERROR'))
          ")
          echo "ERROR findings: $ERRORS"
          [ "$ERRORS" -eq 0 ] || { echo "GATE: BLOCKED - $ERRORS ERROR-severity finding(s)"; exit 1; }

  sca-scan:
    name: SCA (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get cache date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ steps.date.outputs.date }}
          restore-keys: |
            trivy-db-

      - name: Install Trivy
        run: |
          curl -sfL https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Trivy dependency scan
        run: |
          trivy fs src --scanners vuln --severity CRITICAL,HIGH --ignore-unfixed \
            --format json --output trivy-sca.json --exit-code 0
          trivy convert --format sarif --output trivy-sca.sarif trivy-sca.json

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-sca.sarif
          category: trivy-sca

      - name: Gate - block on CRITICAL CVE
        run: |
          CRIT=$(python3 -c "
          import json
          d = json.load(open('trivy-sca.json'))
          print(sum(1 for r in d.get('Results', []) for v in r.get('Vulnerabilities', []) if v.get('Severity') == 'CRITICAL'))
          ")
          echo "CRITICAL vulnerabilities: $CRIT"
          [ "$CRIT" -eq 0 ] || { echo "GATE: BLOCKED - $CRIT CRITICAL CVE(s)"; exit 1; }

  build:
    name: Docker Build
    needs: [lint-test, secrets-scan, sast-scan, sca-scan]
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      image-name: ${{ steps.meta.outputs.name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: meta
        run: |
          echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t cloudmart-app:${{ github.sha }} ./src

      - name: Save image as artifact
        run: docker save cloudmart-app:${{ github.sha }} -o cloudmart-app.tar

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cloudmart-app-image-${{ github.run_attempt }}
          path: cloudmart-app.tar
          retention-days: 1
          overwrite: true

  container-scan:
    name: Container Scan (Trivy)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cloudmart-app-image-${{ github.run_attempt }}

      - name: Load image
        run: docker load -i cloudmart-app.tar

      - name: Get cache date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ steps.date.outputs.date }}
          restore-keys: |
            trivy-db-

      - name: Install Trivy
        run: |
          curl -sfL https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Trivy image scan
        run: |
          trivy image cloudmart-app:${{ needs.build.outputs.image-tag }} --scanners vuln,secret \
            --severity CRITICAL,HIGH --ignore-unfixed --format json --output trivy-image.json --exit-code 0
          trivy convert --format sarif --output trivy-image.sarif trivy-image.json

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-container

      - name: Gate - block on CRITICAL CVE
        run: |
          CRIT=$(python3 -c "
          import json
          d = json.load(open('trivy-image.json'))
          print(sum(1 for r in d.get('Results', []) for v in r.get('Vulnerabilities', []) if v.get('Severity') == 'CRITICAL'))
          ")
          echo "CRITICAL vulnerabilities: $CRIT"
          [ "$CRIT" -eq 0 ] || { echo "GATE: BLOCKED - $CRIT CRITICAL CVE(s)"; exit 1; }

  iac-scan:
    name: IaC Scan (Trivy)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get cache date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ steps.date.outputs.date }}
          restore-keys: |
            trivy-db-

      - name: Install Trivy
        run: |
          curl -sfL https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Trivy config scan
        run: |
          trivy config . --severity CRITICAL,HIGH,MEDIUM --format sarif --output trivy-iac.sarif --exit-code 0
        # WARN only - never blocks

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac
