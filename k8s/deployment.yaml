apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudmart-app
  labels:
    app: cloudmart-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudmart-app
  template:
    metadata:
      labels:
        app: cloudmart-app
    spec:
      automountServiceAccountToken: false
      containers:
        - name: cloudmart-app
          image: ghcr.io/denish02/devsecops:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz.php
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz.php
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cloudmart-app
spec:
  selector:
    app: cloudmart-app
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudmart-app-default-deny
spec:
  podSelector:
    matchLabels:
      app: cloudmart-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
  egress:
    - to:
        - namespaceSelector: {}
